<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Видео-конференция</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f0f4f8;
    margin: 0; padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #video-container {
    display: flex;
    justify-content: flex-start;
    width: 100%;
    height: 70vh;
    overflow-x: auto;
    padding: 10px;
  }

  #my-video {
    width: 300px;
    height: 200px;
    background: black;
    margin-right: 10px;
    border-radius: 10px;
  }

  #peer-videos {
    display: flex;
    gap: 10px;
  }

  video {
    width: 300px;
    height: 200px;
    background: black;
    border-radius: 10px;
  }

  #buttons {
    margin-top: 20px;
    display: flex;
    gap: 15px;
  }

  button {
    padding: 10px 20px;
    font-size: 1em;
    border-radius: 50px;
    border: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<h2>Введите пароль для входа:</h2>
<input type="password" id="password" placeholder="Пароль" />
<button id="enter">Войти</button>

<div id="content" style="display:none; width:100%; max-width:1500px; margin-top:20px;">
  <h1>Видео конференция</h1>
  <div id="video-container">
    <video id="my-video" autoplay muted playsinline></video>
    <div id="peer-videos"></div>
  </div>
  <div id="buttons">
    <button id="mute">🔇</button>
    <button id="video">🎥</button>
    <button id="leave">🚪 Выйти</button>
  </div>
</div>

<script>
const passwordInput = document.getElementById('password');
const enterBtn = document.getElementById('enter');

const contentDiv = document.getElementById('content');
const myVideo = document.getElementById('my-video');
const peerVideosDiv = document.getElementById('peer-videos');

const muteBtn = document.getElementById('mute');
const videoBtn = document.getElementById('video');
const leaveBtn = document.getElementById('leave');

let peerConnections = {};
let localStream;
let socket;
let yourId = null;

const SIGNAL_SERVER_URL = 'ws://localhost:8080'; // Укажите свой адрес сервера

const password = '133221'; // Ваш пароль

// Проверка пароля
document.getElementById('enter').onclick = () => {
  if (passwordInput.value === password) {
    document.getElementById('content').style.display = 'block';
    document.getElementById('auth-section').style.display = 'none';
    start();
  } else {
    alert('Неверный пароль');
  }
};

async function start() {
  await getMedia();

  socket = new WebSocket(SIGNAL_SERVER_URL);

  socket.onopen = () => {
    console.log('Подключено к серверу сигнализации');
  };

  socket.onmessage = async (event) => {
    const message = JSON.parse(event.data);
    const { from, type, sdp, candidate } = message;

    if (from === yourId) return; // игнорируем свои сообщения

    // Создаем или получаем соединение
    if (type === 'offer') {
      await handleOffer(from, sdp);
    }
    if (type === 'answer') {
      await handleAnswer(from, sdp);
    }
    if (type === 'candidate') {
      await handleCandidate(from, candidate);
    }
  };

  // Получим свое id
  socket.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'id') {
      yourId = msg.id;
    }
  };

  // Отправляем сообщение о себе
  function sendMessage(message) {
    socket.send(JSON.stringify({ ...message, from: yourId }));
  }

  // Обмен инициализацией
  // Для каждого нового участника — делаем offer
  // Можно расширить — при входе всех участников

  // В начале, после открытия сокета, отправим сообщение всем
  socket.onopen = () => {
    // Здесь можно отправлять "приветствие" всем
    sendMessage({ type: 'join' });
  }
}

async function getMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    myVideo.srcObject = localStream;
  } catch (err) {
    alert('Ошибка доступа к медиа: ' + err.message);
  }
}

async function handleOffer(from, sdp) {
  const pc = createPeerConnection(from);
  await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp }));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  sendMessage({ type: 'answer', sdp: pc.localDescription.sdp, to: from });
}

async function handleAnswer(from, sdp) {
  const pc = peerConnections[from];
  if (pc) {
    await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp }));
  }
}

async function handleCandidate(from, candidate) {
  const pc = peerConnections[from];
  if (pc && candidate) {
    await pc.addIceCandidate(new RTCIceCandidate(candidate));
  }
}

function createPeerConnection(peerId) {
  const pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });

  peerConnections[peerId] = pc;

  // Добавим локальный поток
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  // Обработка ICE
  pc.onicecandidate = ({ candidate }) => {
    if (candidate) {
      sendMessage({ type: 'candidate', candidate, to: peerId });
    }
  };

  // Обработка входящих потоков
  pc.ontrack = ({ streams: [stream] }) => {
    addPeerStream(peerId, stream);
  };

  // Создаём offer при необходимости
  pc.onnegotiationneeded = async () => {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    sendMessage({ type: 'offer', sdp: pc.localDescription.sdp, to: peerId });
  };

  return pc;
}

function addPeerStream(peerId, stream) {
  let videoElem = document.getElementById('peer-' + peerId);
  if (!videoElem) {
    videoElem = document.createElement('video');
    videoElem.id = 'peer-' + peerId;
    videoElem.autoplay = true;
    videoElem.playsInline = true;
    peerVideosDiv.appendChild(videoElem);
  }
  videoElem.srcObject = stream;
}

// Обработчики кнопок
muteBtn.onclick = () => {
  if (localStream) {
    localStream.getAudioTracks().forEach(track => {
      track.enabled = !track.enabled;
    });
  }
};

videoBtn.onclick = () => {
  if (localStream) {
    localStream.getVideoTracks().forEach(track => {
      track.enabled = !track.enabled;
    });
  }
};

leaveBtn.onclick = () => {
  // закрыть соединение и остановить стрим
  Object.values(peerConnections).forEach(pc => pc.close());
  if (localStream) {
    localStream.getTracks().forEach(track => track.stop());
  }
  socket.close();
  alert('Вы вышли из конференции');
  location.reload();
};
</script>
</body>
</html>
